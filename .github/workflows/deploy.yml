name: Deploy — Apply on Merge

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-2

      - name: Package and upload Lambda
        run: ../scripts/package-lambda.sh --upload platform-service-artifacts-dev lambda/package.zip

      - uses: hashicorp/setup-terraform@v3
      - run: terraform init
      - run: terraform apply -var-file=tfvars-env/dev/dev.tfvars -auto-approve
